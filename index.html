<!DOCTYPE HTML>
<html>
<head>
    <title>Standard Web Development Framing</title>
    <style>
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        iframe {
            width: 100%;
            height: 450px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Embedding Approved Public Content</h2>
        <!-- This uses HTTPS and a specific embed path allowed by the provider -->
        <iframe 
            src="https://roblox.com" 
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
