<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromebook: OFFLINE</title>
    <link href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAAtJREFUGFdjYAACAAAFAAGq1chRAAAAAElFTkSuQmCC" rel="icon">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            border: none;
            outline: none;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .credit {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .credit a {
            color: #fff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        /* Top navbar button if you want to switch URLs manually */
        .nav-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid #444;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: sans-serif;
        }
        .nav-btn:hover {
            background: rgba(50, 50, 50, 0.8);
        }
    </style>
</head>
<body>

    <button class="nav-btn" onclick="askForURL()">Change Game/URL</button>
    
    <iframe id="i" allow="autoplay; gamepad; fullscreen; keyboard"></iframe>

    <div class="credit">
        <a href="https://github.com" target="_blank">@p3xrclmv/Securly-Unblocker</a>
    </div>

    <script>
        // Sets the default web link to load immediately
        // Note: Standard roblox.com blocks frames. Cloud mirrors work best.
        const defaultGameURL = "https://now.gg";

        function loadURL(url) {
            if (!url) return;
            let cleanURL = url.trim();
            
            // Clean up protocol duplicates
            if (!cleanURL.startsWith('http://') && !cleanURL.startsWith('https://')) {
                cleanURL = `https://${cleanURL}`;
            }
            
            document.getElementById('i').src = cleanURL;
        }

        function askForURL() {
            let input = prompt('Enter a custom gaming link or proxy URL:', document.getElementById('i').src);
            if (input) loadURL(input);
        }

        // Run automatically on page load
        loadURL(defaultGameURL);
    </script>
</body>
</html>
